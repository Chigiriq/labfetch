paths:
  data_root: "./data"
  hrrr_dir: "hrrr_raw"
  rave_dir: "rave_raw"
  weights_dir: "regrid_weights"
  zarr_output: "all_fires_combined.zarr"
  log_file: "pipeline.log"

pipeline_defaults:
