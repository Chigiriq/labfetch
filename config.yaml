  time_pad: 24
  min_acres: 100

fetchers:
  hrrr_model: "hrrr"
  hrrr_product: "sfc"
  rave_base_url: "https://www.ospo.noaa.gov/pub/Blended/RAVE/RAVE-HrlyEmiss-3km/"